<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">
<title>😴 睡眠紀錄</title>
<link
rel="stylesheet"
href="style.css?v=4.0.0">
</head>
<body>
<div class="dashboard-container">
    <!-- 玩家資訊 -->
    <section class="profile-card">
        <div class="profile-avatar">
            😴
        </div>
        <div class="profile-info">
            <h2>
                睡眠紀錄
            </h2>
            <p>
                良好的睡眠，是健康最重要的基礎。
            </p>
        </div>
    </section>
    <!-- 標題 -->
    <section class="quote-card">
        <h3>
            昨晚睡了多久？
        </h3>
    </section>
    <label class="record-label">
        睡眠時數（小時）
    </label>
    <input
        type="number"
        step="0.5"
        id="sleepHour"
        class="record-input-large"
        placeholder="例如：7.5">
    <label class="record-label">
        備註（可略）
    </label>
    <textarea
        id="sleepNote"
        class="record-note"
        placeholder="例如：
昨天 11 點睡
今天精神很好
半夜醒來一次..."></textarea>
    <button
        id="saveSleep"
        class="primary-btn">
        💾 儲存紀錄
    </button>
    <section class="quote-card">
        <h3>
            📋 睡眠紀錄
        </h3>
        <p class="record-tip">
            成人建議每日睡眠約 7～9 小時。
        </p>
        <div id="sleepList">
            尚無紀錄
        </div>
    </section>
    <button
        id="backBtn"
        class="primary-btn">
        ← 返回健康世界
    </button>
    <button
        id="homeBtn"
        class="primary-btn">
        🏠 返回首頁
    </button>
    <footer>
        人生RPG v3.0
        <br>
        Health World • Sleep
    </footer>
    </div>
<!-- JavaScript -->
<script>
document.getElementById("backBtn").onclick = function () {
    location.href = "health.html";
};
document.getElementById("homeBtn").onclick = function () {
    location.href = "dashboard.html";
};
</script>
<script src="app.js?v=4.0.0"></script>
<script src="health.js?v=3.0.0"></script>
</body>
</html>
