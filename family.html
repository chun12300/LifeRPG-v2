<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👨‍👩‍👧 親子同樂</title>
<link rel="stylesheet" href="style.css?v=4.0.0">
<style>
.record-delete-small {
    width: 100%;
    margin-top: 10px;
    height: 40px;
    border: none;
    border-radius: 12px;
    background: #E74C3C;
    color: #fff;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>
<body>
<div class="dashboard-container">
    <section class="profile-card">
        <div class="profile-avatar">
            👨‍👩‍👧
        </div>
        <div class="profile-info">
            <h2>親子同樂</h2>
            <p>和家人一起的美好時光</p>
        </div>
    </section>

    <button id="searchMapBtn" class="primary-btn">
        🔍 在 Google 地圖找親子景點
    </button>

    <section class="quote-card">
        <h3>✏️ 新增親子景點</h3>
    </section>

    <label class="record-label">景點名稱</label>
    <input type="text" id="newName" class="record-input-large" placeholder="例如：兒童樂園">

    <label class="record-label">介紹/心得</label>
    <textarea id="newNote" class="record-note" placeholder="例如：適合 3～8 歲，設施安全乾淨"></textarea>

    <label class="record-label">費用</label>
    <select id="newPrice" class="record-select">
        <option value="免費">免費</option>
        <option value="$（100 元以下）">$（100 元以下）</option>
        <option value="$$（100～500 元）">$$（100～500 元）</option>
        <option value="$$$（500 元以上）">$$$（500 元以上）</option>
    </select>

    <button id="addBtn" class="primary-btn">
        ➕ 新增（將以你目前位置作為景點座標）
    </button>

    <section class="quote-card">
        <p id="locationStatus">📍 正在取得你的位置...</p>
    </section>

    <label class="record-label">顯示距離範圍</label>
    <select id="distanceFilter" class="record-select">
        <option value="all">全部顯示</option>
        <option value="10">10 公里內</option>
        <option value="30">30 公里內</option>
        <option value="50">50 公里內</option>
        <option value="100">100 公里內</option>
    </select>

    <div id="restaurantList"></div>

    <button id="backBtn" class="primary-btn">
        ← 返回探索世界
    </button>
    <button id="homeBtn" class="primary-btn">
        🏠 返回首頁
    </button>

    <footer>
        人生RPG v1.0
        <br>
        Explore World • Family
    </footer>
</div>

<script>
var STORAGE_KEY = "customExplore_family";

var defaultList = [
    {
        name: "台北市立動物園",
        lat: 24.9979,
        lng: 121.5814,
        address: "台北市文山區新光路二段30號",
        note: "親子必去，動物種類豐富，貓熊館最受歡迎，記得帶防曬和水。",
        price: "$$（100～500 元）",
        custom: false
    },
    {
        name: "科學工藝博物館",
        lat: 22.6397,
        lng: 120.3014,
        address: "高雄市三民區九如一路684號",
        note: "室內景點不怕曬，互動展覽很豐富，小孩玩得很開心，雨天首選。",
        price: "$（100 元以下）",
        custom: false
    },
    {
        name: "國立自然科學博物館",
        lat: 24.1475,
        lng: 120.6708,
        address: "台中市北區館前路1號",
        note: "恐龍展區超受歡迎，植物園很適合漫步，暑假記得提早買票。",
        price: "$（100 元以下）",
        custom: false
    }
];

function getCustomList() {
    var raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
}

function saveCustomList(list) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}

function getFullList() {
    return defaultList.concat(getCustomList());
}

var userLatForAdd = null;
var userLngForAdd = null;

document.getElementById("searchMapBtn").onclick = function () {
    window.open("https://www.google.com/maps/search/親子景點", "_blank");
};

document.getElementById("addBtn").onclick = function () {
    var name = document.getElementById("newName").value.trim();
    var note = document.getElementById("newNote").value.trim();
    var price = document.getElementById("newPrice").value;

    if (name === "") {
        alert("請輸入景點名稱");
        return;
    }
    if (userLatForAdd === null) {
        alert("尚未取得你的位置，請稍候再試一次");
        return;
    }

    var customList = getCustomList();
    customList.push({
        name: name,
        lat: userLatForAdd,
        lng: userLngForAdd,
        address: "（依新增當下定位）",
        note: note || "（無備註）",
        price: price,
        custom: true
    });
    saveCustomList(customList);

    document.getElementById("newName").value = "";
    document.getElementById("newNote").value = "";

    initFoodDistance(getFullList(), renderList);
};

function deleteCustom(index) {
    if (!confirm("確定刪除這筆景點？")) return;
    var customList = getCustomList();
    customList.splice(index, 1);
    saveCustomList(customList);
    initFoodDistance(getFullList(), renderList);
}

function renderList(list) {
    var box = document.getElementById("restaurantList");

    if (list.length === 0) {
        box.innerHTML = "目前距離範圍內沒有景點，試試擴大範圍。";
        return;
    }

    var customList = getCustomList();
    var html = "";

    list.forEach(function (item, index) {
        var distanceText = item.distance !== null
            ? "📏 距離你約 " + item.distance.toFixed(1) + " 公里"
            : "";

        html += "<div class=\"record-item\">";
        if (item.custom) {
            html += "<div style=\"color:#9CB5DF; font-size:13px; margin-bottom:6px;\">✏️ 自己新增的景點</div>";
        }
        html += "<div class=\"record-title\">" + item.name + "</div>";
        html += "<div class=\"record-content\">";
        html += "📍 <a href=\"https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(item.name) + "\" target=\"_blank\">" + item.address + "</a>";
        html += "<br><br>💬 " + item.note;
        html += "<br><br>💰 " + item.price;
        if (distanceText) {
            html += "<br><br>" + distanceText;
        }
        html += "</div>";

        if (item.custom) {
            var customIndex = customList.findIndex(function (c) {
                return c.name === item.name && c.note === item.note;
            });
            html += "<button class=\"record-delete-small\" onclick=\"deleteCustom(" + customIndex + ")\">🗑️ 刪除這筆</button>";
        }

        html += "</div>";
    });

    box.innerHTML = html;
}

document.getElementById("backBtn").onclick = function () {
    location.href = "explore.html";
};
document.getElementById("homeBtn").onclick = function () {
    location.href = "dashboard.html";
};

if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function (position) {
        userLatForAdd = position.coords.latitude;
        userLngForAdd = position.coords.longitude;
    });
}
</script>
<script src="food_distance.js?v=1.0.0"></script>
<script>
initFoodDistance(getFullList(), renderList);
</script>
</body>
</html>
