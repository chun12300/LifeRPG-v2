<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🏋️ 運動紀錄</title>

<link rel="stylesheet" href="style.css?v=2.0.3">

</head>

<body>

<div class="dashboard-container">

    <section class="profile-card">

        <div class="profile-avatar">

            🏋️

        </div>

        <div class="profile-info">

            <h2>

                運動紀錄

            </h2>

            <p>

                今天，比昨天更強一點。

            </p>

        </div>

    </section>

    <section class="quote-card">

        <p>

            新增今天的運動紀錄

        </p>

    </section>

    <input
        type="text"
        id="exerciseInput"
        placeholder="例如：快走30分鐘">

    <button
        class="primary-btn"
        id="saveExercise">

        💾 儲存紀錄

    </button>

    <section class="quote-card">

        <h3>今日紀錄</h3>

        <div id="exerciseList">

            尚無紀錄

        </div>

    </section>

    <button
        id="backBtn">

        ← 返回健康世界

    </button>

</div>

<script src="app.js?v=2.0.3"></script>

</body>

</html>
