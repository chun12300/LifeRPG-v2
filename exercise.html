<section class="quote-card">

    <h3>

        今天做了什麼？

    </h3>

</section>

<label>

    運動種類

</label>

<select
    id="exerciseType"
    class="record-select">

    <option>快走</option>

    <option>跑步</option>

    <option>重訓</option>

    <option>騎腳踏車</option>

    <option>游泳</option>

    <option>瑜珈</option>

    <option>登山</option>

    <option>伸展</option>

    <option>其它</option>

</select>

<label>

    運動時間（分鐘）

</label>

<input
type="number"
id="exerciseMinute"
class="record-input-small"
placeholder="例如：30">

<label>

    備註（可略）

</label>

<textarea
id="exerciseNote"
class="record-input"
placeholder="今天的心得..."></textarea>
