<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🏋️ 運動紀錄</title>

<link rel="stylesheet" href="style.css?v=2.1.0">

</head>

<body>

<div class="dashboard-container">

    <!-- 標題 -->

    <section class="profile-card">

        <div class="profile-avatar">

            🏋️

        </div>

        <div class="profile-info">

            <h2>

                運動紀錄

            </h2>

            <p>

                今天，比昨天更強一點。

            </p>

        </div>

    </section>

    <!-- 輸入區 -->

    <section class="quote-card">

        <h3>

            今天做了什麼？

        </h3>

    </section>

    <textarea
        id="exerciseInput"
        class="record-input"
        placeholder="例如：

快走30分鐘

重訓45分鐘

瑜珈60分鐘

跑步5公里"></textarea>

    <!-- 儲存 -->

    <button
        class="primary-btn"
        id="saveExercise">

        💾 儲存紀錄

    </button>

    <!-- 今日紀錄 -->

    <section class="quote-card">

        <h3>

            今日紀錄

        </h3>

        <br>

        <div id="exerciseList">

            尚無紀錄

        </div>

    </section>

    <!-- 返回 -->

    <button
        id="backBtn"
        class="primary-btn">

        ← 返回健康世界

    </button>

</div>

<script>

document.getElementById("backBtn").onclick=function(){

    location.href="health.html";

};

</script>

<script src="app.js?v=2.1.0"></script>

</body>

</html>
