<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🏋️ 運動紀錄</title>

<link rel="stylesheet" href="style.css?v=3.0.0">

</head>

<body>

<div class="dashboard-container">

    <!-- 標題 -->

    <section class="profile-card">

        <div class="profile-avatar">

            🏋️

        </div>

        <div class="profile-info">

            <h2>

                運動紀錄

            </h2>

            <p>

                今天，比昨天更強一點。

            </p>

        </div>

    </section>

    <!-- 輸入卡片 -->

    <section class="quote-card">

        <h3>

            今天做了什麼？

        </h3>

    </section>

    <label>

        運動種類

    </label>

    <select
        id="exerciseType"
        class="record-select">

        <option>快走</option>
        <option>慢跑</option>
        <option>跑步</option>
        <option>重訓</option>
        <option>伏地挺身</option>
        <option>深蹲</option>
        <option>瑜珈</option>
        <option>游泳</option>
        <option>騎腳踏車</option>
        <option>登山</option>
        <option>伸展</option>
        <option>其它</option>

    </select>

    <label>

        運動時間（分鐘）

    </label>

    <input
        type="number"
        id="exerciseMinute"
        class="record-input-small"
        placeholder="例如：30">

    <label>

        備註（可略）

    </label>

    <textarea
        id="exerciseNote"
        class="record-input"
        placeholder="今天的心得、身體狀況、感想..."></textarea>

    <button
        id="saveExercise"
        class="primary-btn">

        💾 儲存紀錄

    </button>

    <!-- 今日紀錄 -->

    <section class="quote-card">

        <h3>

            今日紀錄

        </h3>

        <div id="exerciseList">

            尚無紀錄

        </div>

    </section>

    <button
        id="backBtn"
        class="primary-btn">

        ← 返回健康世界

    </button>

</div>

<script src="app.js?v=3.0.0"></script>

<script src="health.js?v=1.0.0"></script>

</body>

</html>
