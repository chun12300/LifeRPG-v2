<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍲 韓式料理</title>
<link rel="stylesheet" href="style.css?v=4.0.0">
<style>
.record-item.highlighted {
    border: 3px solid #FFD86B;
    box-shadow: 0 0 20px rgba(255, 216, 107, 0.6);
    animation: highlight-pulse 1.5s ease-in-out 2;
}
@keyframes highlight-pulse {
    0%, 100% { box-shadow: 0 0 20px rgba(255, 216, 107, 0.6); }
    50% { box-shadow: 0 0 32px rgba(255, 216, 107, 0.9); }
}
.record-delete-small {
    width: 100%;
    margin-top: 10px;
    height: 40px;
    border: none;
    border-radius: 12px;
    background: #E74C3C;
    color: #fff;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>
<body>
<div class="dashboard-container">
    <section class="profile-card">
        <div class="profile-avatar">
            🍲
        </div>
        <div class="profile-info">
            <h2>韓式料理</h2>
            <p>暖心湯品，冷天最對味</p>
        </div>
    </section>

    <button id="searchMapBtn" class="primary-btn">
        🔍 在 Google 地圖找韓式料理
    </button>

    <section class="quote-card">
        <h3>✏️ 新增店家</h3>
    </section>

    <label class="record-label">店名</label>
    <input type="text" id="newName" class="record-input-large" placeholder="例如：首爾家烤肉">

    <label class="record-label">心得</label>
    <textarea id="newNote" class="record-note" placeholder="例如：五花肉超好吃，值得排隊"></textarea>

    <label class="record-label">價位</label>
    <select id="newPrice" class="record-select">
        <option value="$（50～100 元）">$（50～100 元）</option>
        <option value="$$（100～200 元）">$$（100～200 元）</option>
        <option value="$$$（200～400 元）">$$$（200～400 元）</option>
        <option value="$$$$（400 元以上）">$$$$（400 元以上）</option>
    </select>

    <button id="addBtn" class="primary-btn">
        ➕ 新增（將以你目前位置作為店家座標）
    </button>

    <section class="quote-card">
        <p id="locationStatus">📍 正在取得你的位置...</p>
    </section>

    <label class="record-label">顯示距離範圍</label>
    <select id="distanceFilter" class="record-select">
        <option value="all">全部顯示</option>
        <option value="1">1 公里內</option>
        <option value="3">3 公里內</option>
        <option value="5">5 公里內</option>
        <option value="10">10 公里內</option>
    </select>

    <div id="restaurantList"></div>

    <button id="backBtn" class="primary-btn">
        ← 返回美食世界
    </button>
    <button id="homeBtn" class="primary-btn">
        🏠 返回首頁
    </button>

    <footer>
        人生RPG v1.0
        <br>
        Food World • Korean
    </footer>
</div>

<script>
var STORAGE_KEY = "customFood_korean";

var defaultList = [
    {
        name: "首爾家烤肉",
        lat: 25.0500,
        lng: 121.5582,
        address: "台北市松山區八德路",
        note: "五花肉烤得恰到好處，附餐小菜種類豐富，吃到飽方案很划算。",
        price: "$$$（400～600 元）",
        custom: false
    },
    {
        name: "部隊鍋專門店",
        lat: 24.1477,
        lng: 120.6469,
        address: "台中市南屯區文心路",
        note: "部隊鍋料多實在，泡菜自然發酵不死酸，冬天來一鍋整個人都暖了。",
        price: "$$（250～350 元）",
        custom: false
    },
    {
        name: "明洞炸雞屋",
        lat: 22.6273,
        lng: 120.3186,
        address: "高雄市三民區九如二路",
        note: "醬料炸雞外皮酥脆不軟掉，甜辣醬調得很有層次，配啤酒一流。",
        price: "$$（200～300 元）",
        custom: false
    }
];

function getCustomList() {
    var raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
}

function saveCustomList(list) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}

function getFullList() {
    return defaultList.concat(getCustomList());
}

function getHighlightName() {
    var params = new URLSearchParams(window.location.search);
    return params.get("highlight");
}

var userLatForAdd = null;
var userLngForAdd = null;

document.getElementById("searchMapBtn").onclick = function () {
    window.open("https://www.google.com/maps/search/韓式料理", "_blank");
};

document.getElementById("addBtn").onclick = function () {
    var name = document.getElementById("newName").value.trim();
    var note = document.getElementById("newNote").value.trim();
    var price = document.getElementById("newPrice").value;

    if (name === "") {
        alert("請輸入店名");
        return;
    }

    if (userLatForAdd === null) {
        alert("尚未取得你的位置，請稍候再試一次，或確認已允許定位授權");
        return;
    }

    var customList = getCustomList();
    customList.push({
        name: name,
        lat: userLatForAdd,
        lng: userLngForAdd,
        address: "（依新增當下定位）",
        note: note || "（無備註）",
        price: price,
        custom: true
    });
    saveCustomList(customList);

    document.getElementById("newName").value = "";
    document.getElementById("newNote").value = "";

    initFoodDistance(getFullList(), renderRestaurants);
};

function deleteCustom(index) {
    if (!confirm("確定刪除這筆自訂店家？")) return;
    var customList = getCustomList();
    customList.splice(index, 1);
    saveCustomList(customList);
    initFoodDistance(getFullList(), renderRestaurants);
}

function renderRestaurants(list) {
    var box = document.getElementById("restaurantList");

    if (list.length === 0) {
        box.innerHTML = "目前距離範圍內沒有店家，試試擴大範圍。";
        return;
    }

    var highlightName = getHighlightName();
    var customList = getCustomList();
    var html = "";

    list.forEach(function (item, index) {
        var distanceText = item.distance !== null
            ? "📏 距離你約 " + item.distance.toFixed(1) + " 公里"
            : "";

        var isHighlight = highlightName && item.name === highlightName;
        var itemId = "restaurant-" + index;

        html += "<div class=\"record-item" + (isHighlight ? " highlighted" : "") + "\" id=\"" + itemId + "\">";
        if (isHighlight) {
            html += "<div style=\"color:#FFD86B; font-weight:bold; margin-bottom:8px;\">🎯 轉盤抽中這家！</div>";
        }
        if (item.custom) {
            html += "<div style=\"color:#9CB5DF; font-size:13px; margin-bottom:6px;\">✏️ 自己新增的店家</div>";
        }
        html += "<div class=\"record-title\">" + item.name + "</div>";
        html += "<div class=\"record-content\">";
        html += "📍 <a href=\"https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(item.name) + "\" target=\"_blank\">" + item.address + "</a>";
        html += "<br><br>";
        html += "💬 " + item.note;
        html += "<br><br>";
        html += "💰 " + item.price;
        if (distanceText) {
            html += "<br><br>" + distanceText;
        }
        html += "</div>";

        if (item.custom) {
            var customIndex = customList.findIndex(function (c) { return c.name === item.name && c.note === item.note; });
            html += "<button class=\"record-delete-small\" onclick=\"deleteCustom(" + customIndex + ")\">🗑️ 刪除這筆</button>";
        }

        html += "</div>";
    });

    box.innerHTML = html;

    if (highlightName) {
        var targetEl = list.find(function (item) { return item.name === highlightName; });
        if (targetEl) {
            var idx = list.indexOf(targetEl);
            var el = document.getElementById("restaurant-" + idx);
            if (el) {
                setTimeout(function () {
                    el.scrollIntoView({ behavior: "smooth", block: "center" });
                }, 300);
            }
        }
    }
}

document.getElementById("backBtn").onclick = function () {
    location.href = "food.html";
};
document.getElementById("homeBtn").onclick = function () {
    location.href = "dashboard.html";
};

if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function (position) {
        userLatForAdd = position.coords.latitude;
        userLngForAdd = position.coords.longitude;
    });
}
</script>
<script src="food_distance.js?v=1.0.0"></script>
<script>
initFoodDistance(getFullList(), renderRestaurants);
</script>
</body>
</html>
