<!DOCTYPE html>

<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💰 資產管理</title>

<link rel="stylesheet" href="style.css?v=4.0.0">

</head>

<body>

<div class="dashboard-container">

<section class="profile-card">

<div class="profile-avatar">

💰

</div>

<div class="profile-info">

<h2>

資產管理

</h2>

<p>

了解自己的財務現況

</p>

</div>

</section>

<section class="quote-card">

<h3>

我的資產

</h3>

</section>

<label class="record-label">

💵 現金

</label>

<input
type="number"
id="cashValue"
class="record-input-large"
placeholder="例如：5000">

<label class="record-label">

🏦 存款

</label>

<input
type="number"
id="depositValue"
class="record-input-large"
placeholder="例如：250000">

<label class="record-label">

📈 投資

</label>

<input
type="number"
id="investValue"
class="record-input-large"
placeholder="例如：80000">

<label class="record-label">

📦 其它

</label>

<input
type="number"
id="otherValue"
class="record-input-large"
placeholder="例如：3000">

<button
id="saveAsset"
class="primary-btn">

💾 儲存資產

</button>

<section
id="assetResult"
class="quote-card">

<h3>

總資產

</h3>

<p>

尚未計算

</p>

</section>
