<!DOCTYPE html>
<html lang="zh-TW">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>人生RPG v2</title>

    <link rel="stylesheet"
          href="style.css?v=2.0.0">

</head>

<body>

<div class="landing-container">

    <!-- Logo -->

    <div class="logo">

        🌍

    </div>

    <!-- 標題 -->

    <h1>

        人生RPG

    </h1>

    <!-- 人生宣言 -->

    <p class="slogan">

        人生，不需要打怪。<br>

        而是超越昨天的自己。

    </p>

    <!-- 分隔線 -->

    <div class="divider"></div>

    <!-- 使用者資訊 -->

    <div class="form-area">

        <label>

            你的暱稱

        </label>

        <input
            type="text"
            id="nickname"
            placeholder="例如：努力成長的大叔">

        <label>

            人生宣言（可之後修改）

        </label>

        <input
            type="text"
            id="motto"
            placeholder="例如：改變，就是當下。">        <!-- 歡迎文字 -->

        <div class="welcome-text">

            每一天都是新的開始。<br>

            從今天開始，打造屬於你的人生RPG。

        </div>

        <!-- 開始按鈕 -->

        <button id="startBtn">

            🚀 開始人生

        </button>

    </div>

    <!-- 頁尾 -->

    <footer>

        人生RPG v2.0

        <br>

        Life OS • Build Your Better Self

    </footer>
  </div>

<!-- JavaScript -->

<script src="app.js?v=2.0.0"></script>

</body>

</html>
