<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>人生RPG v2</title>
    <link rel="stylesheet"
          href="style.css?v=2.0.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#355CFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="人生RPG">
    <link rel="apple-touch-icon" href="icon.png">
</head>
<body>
<div class="landing-container">
    <div class="logo">
        🌍
    </div>
    <h1>
        人生RPG
    </h1>
    <p class="slogan">
        人生，不需要打怪。<br>
        而是超越昨天的自己。
    </p>
    <div class="divider"></div>
    <div class="form-area">
        <label>
            你的暱稱
        </label>
        <input
            type="text"
            id="nickname"
            placeholder="例如：努力成長的大叔">
        <label>
            人生宣言（可之後修改）
        </label>
        <input
            type="text"
            id="motto"
            placeholder="例如：改變，就是當下。">
        <div class="welcome-text">
            每一天都是新的開始。<br>
            從今天開始，打造屬於你的人生RPG。
        </div>
        <button id="startBtn">
            🚀 開始人生
        </button>
    </div>
    <footer>
        人生RPG v2.0
        <br>
        Life OS • Build Your Better Self
    </footer>
</div>
<script src="app.js?v=2.0.0"></script>
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/LifeRPG-v2/sw.js")
    .then(function () {
        console.log("Service Worker 註冊成功");
    })
    .catch(function (err) {
        console.log("Service Worker 註冊失敗", err);
    });
}
</script>
</body>
</html>
