<!DOCTYPE html>

<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>⚖️ 體重紀錄</title>

<link rel="stylesheet"
href="style.css?v=4.0.0">

</head>

<body>

<div class="dashboard-container">

    <section class="profile-card">

        <div class="profile-avatar">

            ⚖️

        </div>

        <div class="profile-info">

            <h2>

                體重紀錄

            </h2>

            <p>

                每天記錄，掌握自己的變化。

            </p>

        </div>

    </section>

    <section class="quote-card">

        <h3>

            今天的體重

        </h3>

    </section>

    <label class="record-label">

        體重（公斤）

    </label>

    <input

        type="number"

        step="0.1"

        id="weightValue"

        class="record-input-large"

        placeholder="例如：72.5">
    <label class="record-label">

        備註（可略）

    </label>

    <textarea

        id="weightNote"

        class="record-note"

        placeholder="例如：
今天早餐吃比較多
昨天有運動
最近睡眠比較不足..."></textarea>

    <button

        id="saveWeight"

        class="primary-btn">

        💾 儲存紀錄

    </button>

    <!-- 今日紀錄 -->

    <section class="quote-card">

        <h3>

            📋 體重紀錄

        </h3>

        <p class="record-tip">

            每天固定時間量測，最容易觀察變化。

        </p>

        <div id="weightList">

            尚無紀錄

        </div>

    </section>

    <button

        id="backBtn"

        class="primary-btn">

        ← 返回健康世界

    </button>
    </div>

<!-- 共用程式 -->

<script src="app.js?v=4.0.0"></script>

<!-- 健康模組 -->

<script src="health.js?v=1.1.0"></script>

</body>

</html>
