<!DOCTYPE html>

<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🪙 複利計算器</title>

<link rel="stylesheet" href="style.css?v=4.0.0">

</head>

<body>

<div class="dashboard-container">

    <section class="profile-card">

        <div class="profile-avatar">

            🪙

        </div>

        <div class="profile-info">

            <h2>

                複利計算器

            </h2>

            <p>

                時間 × 紀律 × 複利 = 財富

            </p>

        </div>

    </section>

    <section class="quote-card">

        <h3>

            開始你的財富旅程

        </h3>

    </section>

    <label class="record-label">

        每月投入（元）

    </label>

    <input

        type="number"

        id="monthlyAmount"

        class="record-input-large"

        placeholder="例如：3000">

    <label class="record-label">

        年化報酬率（%）

    </label>

    <input

        type="number"

        id="annualRate"

        class="record-input-large"

        placeholder="例如：6">

    <label class="record-label">

        投資年數

    </label>

    <input

        type="number"

        id="investmentYears"

        class="record-input-large"

        placeholder="例如：30">

    <button

        id="calculateCompound"

        class="primary-btn">

        📈 開始計算

    </button>

    <section
        id="compoundResult"
        class="quote-card">

        <h3>

            尚未計算

        </h3>

    </section>
