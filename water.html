<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💧 喝水紀錄</title>

<link rel="stylesheet" href="style.css?v=4.0.0">

</head>

<body>

<div class="dashboard-container">

    <section class="profile-card">

        <div class="profile-avatar">

            💧

        </div>

        <div class="profile-info">

            <h2>喝水紀錄</h2>

            <p>每天補充足夠水分</p>

        </div>

    </section>

    <section class="quote-card">

        <h3>今日喝水量</h3>

    </section>

    <label class="record-label">

        💧 飲水量（ml）

    </label>

    <input

        type="number"

        id="waterInput"

        class="record-input-large"

        placeholder="例如：250"

    >

    <button

        id="saveWater"

        class="primary-btn"

    >

        💾 紀錄喝水

    </button>

    <section

        id="waterResult"

        class="quote-card"

    >

        <h3>今日累積</h3>

        <p>0 ml</p>

    </section>

    <button

        id="backBtn"

        class="primary-btn"

    >

        ← 返回健康世界

    </button>

    <button

        id="homeBtn"

        class="primary-btn"

    >

        🏠 返回首頁

    </button>

    <footer>

        人生RPG v1.0

        <br>

        Health World • Water

    </footer>

</div>

<script src="health.js?v=4.0.0"></script>

</body>

</html>
