<!DOCTYPE html>

<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>💧 喝水紀錄</title>

<link
rel="stylesheet"
href="style.css?v=4.0.0">

</head>

<body>

<div class="dashboard-container">

    <!-- 玩家資訊 -->

    <section class="profile-card">

        <div class="profile-avatar">

            💧

        </div>

        <div class="profile-info">

            <h2>

                喝水紀錄

            </h2>

            <p>

                每天補充水分，照顧自己的健康。

            </p>

        </div>

    </section>

    <!-- 標題 -->

    <section class="quote-card">

        <h3>

            今天喝了多少水？

        </h3>

    </section>

    <label class="record-label">

        喝水量（ml）

    </label>

    <input

        type="number"

        id="waterValue"

        class="record-input-large"

        placeholder="例如：500">

    <label class="record-label">

        備註（可略）

    </label>
        <textarea

        id="waterNote"

        class="record-note"

        placeholder="例如：
今天運動流很多汗
下午補充 600ml
天氣很熱，多喝一點水..."></textarea>

    <button

        id="saveWater"

        class="primary-btn">

        💾 儲存紀錄

    </button>

    <!-- 紀錄 -->

    <section class="quote-card">

        <h3>

            📋 喝水紀錄

        </h3>

        <p class="record-tip">

            建議每日飲水量約 2000～2500 ml（依個人狀況調整）。

        </p>

        <div id="waterList">

            尚無紀錄

        </div>

    </section>

    <button

        id="backBtn"

        class="primary-btn">

        ← 返回健康世界

    </button>

    <footer>

        人生RPG v3.0

        <br>

        Health World • Water

    </footer>
    </div>

<!-- JavaScript -->

<script src="app.js?v=4.0.0"></script>

<script src="health.js?v=3.0.0"></script>

</body>

</html>
