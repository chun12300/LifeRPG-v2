<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍱 台式料理</title>
<link rel="stylesheet" href="style.css?v=4.0.0">
<style>
.record-item.highlighted {
    border: 3px solid #FFD86B;
    box-shadow: 0 0 20px rgba(255, 216, 107, 0.6);
    animation: highlight-pulse 1.5s ease-in-out 2;
}
@keyframes highlight-pulse {
    0%, 100% { box-shadow: 0 0 20px rgba(255, 216, 107, 0.6); }
    50% { box-shadow: 0 0 32px rgba(255, 216, 107, 0.9); }
}
</style>
</head>
<body>
<div class="dashboard-container">
    <section class="profile-card">
        <div class="profile-avatar">
            🍱
        </div>
        <div class="profile-info">
            <h2>台式料理</h2>
            <p>道地家鄉味，吃了會想家</p>
        </div>
    </section>
    <section class="quote-card">
        <p id="locationStatus">📍 正在取得你的位置...</p>
    </section>
    <label class="record-label">顯示距離範圍</label>
    <select id="distanceFilter" class="record-select">
        <option value="all">全部顯示</option>
        <option value="1">1 公里內</option>
        <option value="3">3 公里內</option>
        <option value="5">5 公里內</option>
        <option value="10">10 公里內</option>
    </select>
    <div id="restaurantList"></div>
    <button id="backBtn" class="primary-btn">
        ← 返回美食世界
    </button>
    <button id="homeBtn" class="primary-btn">
        🏠 返回首頁
    </button>
    <footer>
        人生RPG v1.0
        <br>
        Food World • Taiwanese
    </footer>
</div>
<script>
var taiwaneseList = [
    {
        name: "阿嬤的灶咖",
        lat: 24.1469,
        lng: 120.6839,
        address: "台中市西區美村路",
        note: "滷肉飯香氣十足，滷汁入味不死鹹，是巷口排隊名店。",
        price: "$$（100～200 元）"
    },
    {
        name: "大份小炒",
        lat: 25.0418,
        lng: 121.5436,
        address: "台北市大安區忠孝東路",
        note: "熱炒類份量超大，三杯雞跟蒜泥白肉是招牌，適合多人聚餐。",
        price: "$$$（300～500 元）"
    },
    {
        name: "巷口意麵",
        lat: 22.6204,
        lng: 120.2825,
        address: "高雄市鹽埕區七賢路",
        note: "古早味意麵，湯頭清爽，搭配滷蛋跟燙青菜剛剛好，銅板價超划算。",
        price: "$（50～100 元）"
    },
    {
        name: "阿福羹麵",
        lat: 22.9956,
        lng: 120.2007,
        address: "台南市中西區民族路",
        note: "肉羹湯頭濃郁帶點甜味，肉羹條Q彈不軟爛，台南老店風味。",
        price: "$$（100～200 元）"
    }
];

function getHighlightName() {
    var params = new URLSearchParams(window.location.search);
    return params.get("highlight");
}

function renderRestaurants(list) {
    var box = document.getElementById("restaurantList");

    if (list.length === 0) {
        box.innerHTML = "目前距離範圍內沒有店家，試試擴大範圍。";
        return;
    }

    var highlightName = getHighlightName();
    var html = "";

    list.forEach(function (item, index) {
        var distanceText = item.distance !== null
            ? "📏 距離你約 " + item.distance.toFixed(1) + " 公里"
            : "";

        var isHighlight = highlightName && item.name === highlightName;
        var itemId = "restaurant-" + index;

        html += "<div class=\"record-item" + (isHighlight ? " highlighted" : "") + "\" id=\"" + itemId + "\">";
        if (isHighlight) {
            html += "<div style=\"color:#FFD86B; font-weight:bold; margin-bottom:8px;\">🎯 轉盤抽中這家！</div>";
        }
        html += "<div class=\"record-title\">" + item.name + "</div>";
        html += "<div class=\"record-content\">";
        html += "📍 <a href=\"https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(item.name) + "\" target=\"_blank\">" + item.address + "</a>";
        html += "<br><br>";
        html += "💬 " + item.note;
        html += "<br><br>";
        html += "💰 " + item.price;
        if (distanceText) {
            html += "<br><br>" + distanceText;
        }
        html += "</div></div>";
    });

    box.innerHTML = html;

    if (highlightName) {
        var targetEl = list.find(function (item) { return item.name === highlightName; });
        if (targetEl) {
            var idx = list.indexOf(targetEl);
            var el = document.getElementById("restaurant-" + idx);
            if (el) {
                setTimeout(function () {
                    el.scrollIntoView({ behavior: "smooth", block: "center" });
                }, 300);
            }
        }
    }
}

document.getElementById("backBtn").onclick = function () {
    location.href = "food.html";
};
document.getElementById("homeBtn").onclick = function () {
    location.href = "dashboard.html";
};
</script>
<script src="food_distance.js?v=1.0.0"></script>
<script>
initFoodDistance(taiwaneseList, renderRestaurants);
</script>
</body>
</html>
