<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">
<title>📏 BMI 計算</title>
<link
rel="stylesheet"
href="style.css?v=4.0.0">
</head>
<body>
<div class="dashboard-container">
    <section class="profile-card">
        <div class="profile-avatar">
            📏
        </div>
        <div class="profile-info">
            <h2>
                BMI 健康工具
            </h2>
            <p>
                快速計算 BMI，了解自己的身體狀況。
            </p>
        </div>
    </section>
    <section class="quote-card">
        <h3>
            BMI 計算
        </h3>
    </section>
    <label class="record-label">
        身高（cm）
    </label>
    <input
        type="number"
        id="heightValue"
        class="record-input-large"
        placeholder="例如：170">
    <label class="record-label">
        體重（kg）
    </label>
    <input
        type="number"
        step="0.1"
        id="weightValue"
        class="record-input-large"
        placeholder="例如：65">
    <button
        id="calculateBMI"
        class="primary-btn">
        📏 計算 BMI
    </button>
    <section
        id="bmiResult"
        class="quote-card">
        <h3>
            BMI 尚未計算
        </h3>
    </section>
    <label class="record-label">
        備註（可略）
    </label>
    <textarea
        id="bmiNote"
        class="record-note"
        placeholder="例如：
開始減脂
三個月目標 BMI 22
持續追蹤..."></textarea>
    <button
        id="saveBMI"
        class="primary-btn">
        💾 儲存紀錄
    </button>
    <section class="quote-card">
        <h3>
            📋 BMI 紀錄
        </h3>
        <div id="bmiList">
            尚無紀錄
        </div>
    </section>
    <button
        id="backBtn"
        class="primary-btn">
        ← 返回健康世界
    </button>
    <button
        id="homeBtn"
        class="primary-btn">
        🏠 返回首頁
    </button>
    <footer>
        人生RPG v3.0
        <br>
        Health World • BMI
    </footer>
    </div>
<!-- JavaScript -->
<script>
document.getElementById("backBtn").onclick = function () {
    location.href = "health.html";
};
document.getElementById("homeBtn").onclick = function () {
    location.href = "dashboard.html";
};
</script>
<script src="health.js?v=3.0.1"></script>
</body>
</html>
