<!DOCTYPE html>

<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>📏 BMI 計算</title>

<link rel="stylesheet"
href="style.css?v=4.0.0">

</head>

<body>

<div class="dashboard-container">

    <section class="profile-card">

        <div class="profile-avatar">

            📏

        </div>

        <div class="profile-info">

            <h2>

                BMI 計算

            </h2>

            <p>

                了解自己的身體狀態。

            </p>

        </div>

    </section>

    <section class="quote-card">

        <h3>

            BMI 計算

        </h3>

    </section>

    <label class="record-label">

        身高（cm）

    </label>

    <input

        type="number"

        id="heightValue"

        class="record-input-large"

        placeholder="例如：170">

    <label class="record-label">

        體重（kg）

    </label>

    <input

        type="number"

        step="0.1"

        id="weightValue"

        class="record-input-large"

        placeholder="例如：68.5">
    <button

        id="calculateBMI"

        class="primary-btn">

        🧮 計算 BMI

    </button>

    <section class="quote-card">

        <h3>

            📊 BMI 結果

        </h3>

        <div id="bmiResult">

            尚未計算

        </div>

    </section>

    <label class="record-label">

        備註（可略）

    </label>

    <textarea

        id="bmiNote"

        class="record-note"

        placeholder="例如：
最近開始減脂
希望 BMI 降到 22
持續觀察變化..."></textarea>

    <button

        id="saveBMI"

        class="primary-btn">

        💾 儲存紀錄

    </button>

    <!-- BMI 紀錄 -->

    <section class="quote-card">

        <h3>

            📋 BMI 紀錄

        </h3>

        <p class="record-tip">

            BMI 只是健康參考指標，請搭配體脂率、腰圍等資訊一起評估。

        </p>

        <div id="bmiList">

            尚無紀錄

        </div>

    </section>

    <button

        id="backBtn"

        class="primary-btn">

        ← 返回健康世界

    </button>
    </div>

<!-- 共用程式 -->

<script src="app.js?v=4.0.0"></script>

<!-- 健康模組 -->

<script src="health.js?v=1.1.0"></script>

</body>

</html>
