<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎡 轉盤選美食</title>
<link rel="stylesheet" href="style.css?v=4.0.0">
<style>
.wheel-wrap {
    position: relative;
    width: 280px;
    height: 280px;
    margin: 24px auto;
}
.wheel {
    width: 280px;
    height: 280px;
    border-radius: 50%;
    border: 6px solid #fff;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    background: conic-gradient(
        #ffb347 0deg 90deg,
        #ff7b7b 90deg 180deg,
        #7bc9ff 180deg 270deg,
        #9be37b 270deg 360deg
    );
    position: relative;
    transition: transform 3s cubic-bezier(0.17, 0.67, 0.12, 0.99);
}
.wheel-label {
    position: absolute;
    top: 0;
    left: 50%;
    width: 50%;
    height: 50%;
    transform-origin: 0% 100%;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 30px;
    font-size: 14px;
    font-weight: bold;
    color: #333;
}
.pointer {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 22px solid #333;
    z-index: 10;
}
.wheel-result {
    text-align: center;
    margin-top: 8px;
}
.name-roll {
    font-size: 20px;
    font-weight: bold;
    min-height: 28px;
    color: #ff7b7b;
}
.name-roll.settled {
    color: #333;
    animation: settle-pop 0.4s ease;
}
@keyframes settle-pop {
    0% { transform: scale(1.3); }
    60% { transform: scale(0.95); }
    100% { transform: scale(1); }
}
</style>
</head>
<body>
<div class="dashboard-container">
    <section class="profile-card">
        <div class="profile-avatar">
            🎡
        </div>
        <div class="profile-info">
            <h2>轉盤選美食</h2>
            <p>選擇困難？讓命運決定今天吃什麼！</p>
        </div>
    </section>

    <section class="quote-card">
        <p id="locationStatus">📍 正在取得你的位置...</p>
    </section>

    <label class="record-label">轉盤範圍</label>
    <select id="distanceFilter" class="record-select">
        <option value="all">全部範圍</option>
        <option value="1">1 公里內</option>
        <option value="3">3 公里內</option>
        <option value="5">5 公里內</option>
        <option value="10">10 公里內</option>
    </select>

    <div class="wheel-wrap">
        <div class="pointer"></div>
        <div class="wheel" id="wheel">
            <div class="wheel-label" style="transform: rotate(45deg);">🍱 台式</div>
            <div class="wheel-label" style="transform: rotate(135deg);">🍣 日式</div>
            <div class="wheel-label" style="transform: rotate(225deg);">🍛 泰式</div>
            <div class="wheel-label" style="transform: rotate(315deg);">🍲 韓式</div>
        </div>
    </div>

    <button id="spinBtn" class="primary-btn">
        🎲 開始轉動
    </button>

    <section id="wheelResult" class="quote-card wheel-result">
        <h3>轉一轉，看看今天吃什麼！</h3>
    </section>

    <button id="backBtn" class="primary-btn">
        ← 返回美食世界
    </button>
    <button id="homeBtn" class="primary-btn">
        🏠 返回首頁
    </button>

    <footer>
        人生RPG v1.0
        <br>
        Food World • Wheel
    </footer>
</div>

<script>
var foodPool = {
    "台式": [
        { name: "阿嬤的灶咖", lat: 24.1469, lng: 120.6839, page: "taiwanese.html" },
        { name: "大份小炒", lat: 25.0418, lng: 121.5436, page: "taiwanese.html" },
        { name: "巷口意麵", lat: 22.6204, lng: 120.2825, page: "taiwanese.html" },
        { name: "阿福羹麵", lat: 22.9956, lng: 120.2007, page: "taiwanese.html" }
    ],
    "日式": [
        { name: "弐丸壽司", lat: 25.0330, lng: 121.5640, page: "japanese.html" },
        { name: "麵屋一燈", lat: 24.1614, lng: 120.6483, page: "japanese.html" },
        { name: "串燒和民", lat: 22.6829, lng: 120.2945, page: "japanese.html" }
    ],
    "泰式": [
        { name: "曼谷小館", lat: 25.0631, lng: 121.5267, page: "thai.html" },
        { name: "湄南河風味", lat: 24.1505, lng: 120.6839, page: "thai.html" },
        { name: "小象泰食堂", lat: 22.6177, lng: 120.3122, page: "thai.html" }
    ],
    "韓式": [
        { name: "首爾家烤肉", lat: 25.0500, lng: 121.5582, page: "korean.html" },
        { name: "部隊鍋專門店", lat: 24.1477, lng: 120.6469, page: "korean.html" },
        { name: "明洞炸雞屋", lat: 22.6273, lng: 120.3186, page: "korean.html" }
    ]
};

var categories = ["台式", "日式", "泰式", "韓式"];
var currentRotation = 0;
var spinning = false;
var userLat = null;
var userLng = null;

function calcDistanceKm(lat1, lng1, lat2, lng2) {
    var R = 6371;
    var dLat = (lat2 - lat1) * Math.PI / 180;
    var dLng = (lng2 - lng1) * Math.PI / 180;
    var a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLng / 2) * Math.sin(dLng / 2);
    var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
}

function getFilteredPool() {
    var filterValue = document.getElementById("distanceFilter").value;
    var filtered = {};

    categories.forEach(function (cat) {
        var list = foodPool[cat];

        if (filterValue === "all" || userLat === null) {
            filtered[cat] = list;
        } else {
            var maxKm = parseFloat(filterValue);
            filtered[cat] = list.filter(function (item) {
                var d = calcDistanceKm(userLat, userLng, item.lat, item.lng);
                return d <= maxKm;
            });
        }
    });

    return filtered;
}

document.getElementById("spinBtn").onclick = function () {
    if (spinning) return;

    var filteredPool = getFilteredPool();

    var availableCategories = categories.filter(function (cat) {
        return filteredPool[cat].length > 0;
    });

    if (availableCategories.length === 0) {
        var resultBox = document.getElementById("wheelResult");
        resultBox.innerHTML = "<h3>😢 這個範圍內沒有符合的店家，試試擴大範圍吧！</h3>";
        return;
    }

    spinning = true;

    // 先決定抽中的分類與店家（資料層先確定，不受視覺動畫影響）
    var category = availableCategories[Math.floor(Math.random() * availableCategories.length)];
    var categoryIndex = categories.indexOf(category);
    var list = filteredPool[category];
    var pick = list[Math.floor(Math.random() * list.length)];

    // 視覺轉盤角度對齊：每格中心角度 = index*90 + 45
    var sliceCenter = categoryIndex * 90 + 45;
    var extraSpins = 4 + Math.floor(Math.random() * 3);
    var targetRotation = extraSpins * 360 + (360 - sliceCenter);

    currentRotation += targetRotation;

    var wheel = document.getElementById("wheel");
    wheel.style.transform = "rotate(" + currentRotation + "deg)";

    setTimeout(function () {
        var resultBox = document.getElementById("wheelResult");
        resultBox.innerHTML =
            "<h3>🎉 分類：" + category + "</h3>" +
            "<div class=\"name-roll\" id=\"nameRoll\">抽選中...</div>" +
            "<div id=\"detailArea\"></div>";

        var rollEl = document.getElementById("nameRoll");

        var allNames = [];
        categories.forEach(function (c) {
            filteredPool[c].forEach(function (item) {
                allNames.push(item.name);
            });
        });

        var rollCount = 0;
        var maxRolls = 18;
        var delay = 60;

        function rollStep() {
            rollCount++;

            if (rollCount >= maxRolls) {
                rollEl.textContent = pick.name;
                rollEl.classList.add("settled");

                var detailArea = document.getElementById("detailArea");
                detailArea.innerHTML =
                    "<button class=\"primary-btn\" onclick=\"location.href='" + pick.page + "'\">查看詳情 →</button>";

                spinning = false;
                return;
            }

            var randomName = allNames[Math.floor(Math.random() * allNames.length)];
            rollEl.textContent = randomName;

            delay = delay + rollCount * 6;
            setTimeout(rollStep, delay);
        }

        rollStep();
    }, 3000);
};

var statusBox = document.getElementById("locationStatus");

if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
        function (position) {
            userLat = position.coords.latitude;
            userLng = position.coords.longitude;
            statusBox.innerHTML = "📍 已取得你的位置，可依距離篩選轉盤範圍";
        },
        function () {
            statusBox.innerHTML = "⚠️ 無法取得你的位置，將以全部範圍轉動";
        }
    );
} else {
    statusBox.innerHTML = "⚠️ 你的瀏覽器不支援定位功能";
}

document.getElementById("backBtn").onclick = function () {
    location.href = "food.html";
};
document.getElementById("homeBtn").onclick = function () {
    location.href = "dashboard.html";
};
</script>
</body>
</html>
